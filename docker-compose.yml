# ============================================================
# Hybrid Database Framework — Docker Compose
# ============================================================
# Starts MongoDB and the application together.
# Usage:
#   docker compose up --build        (first time / after code changes)
#   docker compose up                (subsequent runs)
#   docker compose down              (stop all)
#   docker compose down -v           (stop + delete data volumes)
# ============================================================

services:
  # ---- MongoDB ----
  mongodb:
    image: mongo:7.0
    container_name: hybrid-db-mongo
    command: ["--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---- Backend API + Dashboard ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hybrid-db-app
    ports:
      - "8000:8000"
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - PYTHONUNBUFFERED=1
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      # Persist SQLite database and metadata across restarts
      - app_data:/app/data
      # Mount docs for benchmark results (optional)
      - ./docs:/app/docs

volumes:
  mongo_data:
    driver: local
  app_data:
    driver: local
